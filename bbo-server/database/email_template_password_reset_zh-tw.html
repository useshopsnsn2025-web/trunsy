<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 - {platform_name}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
</head>
<body style="margin: 0; padding: 0; background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f8fafc;">
        <tr>
            <td align="center" style="padding: 48px 20px;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="520" style="max-width: 520px;">

                    <!-- Logo Header -->
                    <tr>
                        <td style="padding: 0 0 32px 0; text-align: center;">
                            <a href="{platform_url}">
                                <img src="{template_logo}" alt="{platform_name}" height="32" style="height: 32px; border: 0;" />
                            </a>
                        </td>
                    </tr>

                    <!-- Main Card -->
                    <tr>
                        <td>
                            <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);">

                                <!-- Icon & Title -->
                                <tr>
                                    <td style="padding: 40px 40px 0 40px; text-align: center;">
                                        <!-- Lock Icon Circle -->
                                        <div style="width: 72px; height: 72px; margin: 0 auto 24px auto; background: linear-gradient(135deg, #FF6B35 0%, #FF8F65 100%); border-radius: 50%; display: inline-block;">
                                            <table role="presentation" cellpadding="0" cellspacing="0" width="72" height="72">
                                                <tr>
                                                    <td align="center" valign="middle">
                                                        <img src="https://cdn.jsdelivr.net/npm/heroicons@2.0.18/24/outline/lock-closed.svg" alt="" width="32" height="32" style="filter: brightness(0) invert(1);" />
                                                    </td>
                                                </tr>
                                            </table>
                                        </div>
                                        <h1 style="margin: 0 0 8px 0; font-size: 26px; font-weight: 700; color: #1e293b; line-height: 1.3; letter-spacing: -0.5px;">
                                            重設密碼
                                        </h1>
                                        <p style="margin: 0; font-size: 15px; color: #64748b; line-height: 1.5;">
                                            請輸入以下驗證碼來重設您的密碼
                                        </p>
                                    </td>
                                </tr>

                                <!-- Greeting -->
                                <tr>
                                    <td style="padding: 32px 40px 0 40px;">
                                        <p style="margin: 0; font-size: 15px; color: #475569; line-height: 1.7;">
                                            您好 <strong style="color: #1e293b;">{nickname}</strong>，
                                        </p>
                                        <p style="margin: 12px 0 0 0; font-size: 15px; color: #475569; line-height: 1.7;">
                                            我們收到了重設您 {platform_name} 帳戶密碼的請求。請使用以下驗證碼：
                                        </p>
                                    </td>
                                </tr>

                                <!-- Verification Code Box -->
                                <tr>
                                    <td style="padding: 28px 40px;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); border: 1px solid #e2e8f0; border-radius: 12px;">
                                            <tr>
                                                <td style="padding: 28px 24px; text-align: center;">
                                                    <p style="margin: 0 0 12px 0; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px;">
                                                        驗證碼
                                                    </p>
                                                    <p style="margin: 0; font-size: 42px; font-weight: 700; color: #1e293b; letter-spacing: 12px; font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;">
                                                        {code}
                                                    </p>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>

                                <!-- Expiry Badge -->
                                <tr>
                                    <td style="padding: 0 40px 32px 40px; text-align: center;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" style="display: inline-table;">
                                            <tr>
                                                <td style="background-color: #fef3c7; border-radius: 20px; padding: 8px 16px;">
                                                    <table role="presentation" cellpadding="0" cellspacing="0">
                                                        <tr>
                                                            <td valign="middle" style="padding-right: 6px;">
                                                                <img src="https://cdn.jsdelivr.net/npm/heroicons@2.0.18/24/outline/clock.svg" alt="" width="16" height="16" style="display: block; filter: invert(52%) sepia(95%) saturate(1041%) hue-rotate(1deg) brightness(105%) contrast(101%);" />
                                                            </td>
                                                            <td valign="middle">
                                                                <span style="font-size: 13px; font-weight: 600; color: #b45309;">
                                                                    {expires_minutes} 分鐘內有效
                                                                </span>
                                                            </td>
                                                        </tr>
                                                    </table>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>

                                <!-- Divider -->
                                <tr>
                                    <td style="padding: 0 40px;">
                                        <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 0;" />
                                    </td>
                                </tr>

                                <!-- Security Notice -->
                                <tr>
                                    <td style="padding: 24px 40px 32px 40px;">
                                        <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td width="36" valign="top" style="padding-right: 12px;">
                                                    <div style="width: 28px; height: 28px; background-color: #f1f5f9; border-radius: 8px; text-align: center; line-height: 28px;">
                                                        <img src="https://cdn.jsdelivr.net/npm/heroicons@2.0.18/24/outline/shield-exclamation.svg" alt="" width="16" height="16" style="vertical-align: middle; filter: invert(45%) sepia(12%) saturate(456%) hue-rotate(182deg) brightness(92%) contrast(87%);" />
                                                    </div>
                                                </td>
                                                <td>
                                                    <p style="margin: 0; font-size: 13px; color: #64748b; line-height: 1.6;">
                                                        如果您沒有請求重設密碼，請忽略此郵件。除非您輸入上述驗證碼，否則您的密碼不會被更改。
                                                    </p>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>

                            </table>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 32px 0 0 0; text-align: center;">
                            <p style="margin: 0 0 8px 0; font-size: 13px; color: #94a3b8; line-height: 1.6;">
                                這是來自 {platform_name} 的自動郵件
                            </p>
                            <p style="margin: 0; font-size: 12px; color: #cbd5e1; line-height: 1.6;">
                                &copy; {current_year} {platform_name}. 保留所有權利。
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
